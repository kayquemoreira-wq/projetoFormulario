<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container"></div>
    <header class="cabecalho">
        <h3>Cadastre seu veículo para vender mais rapido</h3>
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>Formulário</p>
        </div>
    </div>
        <div class="formy-body">
            <h1 class="titulo-form">Venda fácil seu carro</h1>
            <p>Descreva as caracteristicas do seu carro e marque </p>
            <form>
                <div class="caixaInputs">
                    <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="lock" placeholder="Digite um título para o anúncio">
                </div>
                <div class="caixaInputs">
                    <label for="title">Preço <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" class="preco" placeholder="Digite o preço">
                </div>
                <div class="caixainputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" class="block" placeholder="Digite a descrição do seu veículo"></textarea>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
